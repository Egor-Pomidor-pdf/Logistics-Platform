apiVersion: apps/v1
kind: Deployment
metadata:
  name: logistics-normalizer-service
  namespace: logistics
  labels:
    app: logistics-normalizer-service
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: logistics-normalizer-service
  template:
    metadata:
      labels:
        app: logistics-normalizer-service
      annotations:
        instrumentation.opentelemetry.io/inject-go: "false"
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: logistics-normalizer-service
          image: ghcr.io/dns/logistics/logistics-normalizer-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: logistics-normalizer-config
            - secretRef:
                name: logistics-normalizer-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 150m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
