apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-exporter
  namespace: logistics
  labels:
    app: analytics-exporter
spec:
  # Single replica: advisory locks in PostgreSQL prevent duplicate exports.
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: analytics-exporter
  template:
    metadata:
      labels:
        app: analytics-exporter
      annotations:
        instrumentation.opentelemetry.io/inject-go: "false"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: analytics-exporter
          image: ghcr.io/dns/logistics/analytics-exporter:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
          envFrom:
            - configMapRef:
                name: analytics-exporter-config
            - secretRef:
                name: analytics-exporter-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
