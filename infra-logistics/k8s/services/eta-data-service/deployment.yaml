apiVersion: apps/v1
kind: Deployment
metadata:
  name: eta-data-service
  namespace: logistics
  labels:
    app: eta-data-service
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: eta-data-service
  template:
    metadata:
      labels:
        app: eta-data-service
      annotations:
        instrumentation.opentelemetry.io/inject-go: "false"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: eta-data-service
          image: ghcr.io/dns/logistics/eta-data-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8083
          envFrom:
            - configMapRef:
                name: eta-data-config
            - secretRef:
                name: eta-data-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
