apiVersion: v1
kind: ConfigMap
metadata:
  name: eta-data-config
  namespace: logistics
  labels:
    app: eta-data-service
data:
  SERVICE_NAME: eta-data-service
  LOG_LEVEL: info
  HTTP_ADDR: ":8083"
  OTLP_ENDPOINT: otel-agent.observability.svc.cluster.local:4317

  REDIS_ADDR: redis.logistics.svc.cluster.local:6379
  REDIS_DB: "0"
  FEATURE_TTL: 10m

  RABBITMQ_URL: amqp://guest:guest@rabbitmq.logistics.svc.cluster.local:5672/
  RABBITMQ_EXCHANGE: eta_data_exchange
  RABBITMQ_QUEUE: eta_data_recalc
  RABBITMQ_ROUTING_KEY: eta_data.recalc
  RABBITMQ_DLQ: eta_data_recalc.dlq
  RABBITMQ_PREFETCH: "64"
  WORKER_COUNT: "8"

  DB_QUERY_TIMEOUT: 3s
  DB_WRITE_TIMEOUT: 5s
  DB_CONNECT_TIMEOUT: 3s
  PG_MAX_CONNS: "40"
  PG_MIN_CONNS: "5"
  PG_MAX_CONN_LIFETIME: 30m
  PG_MAX_CONN_IDLE_TIME: 10m
  PG_HEALTH_CHECK_PERIOD: 30s
  ENABLE_AUTO_MIGRATE: "false"
