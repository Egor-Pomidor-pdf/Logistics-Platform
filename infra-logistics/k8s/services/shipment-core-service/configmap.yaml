apiVersion: v1
kind: ConfigMap
metadata:
  name: shipment-core-config
  namespace: logistics
  labels:
    app: shipment-core-service
data:
  SERVICE_NAME: shipment-core-service
  LOG_LEVEL: info
  HTTP_ADDR: ":8080"
  GRPC_ADDR: ":9090"
  OTLP_ENDPOINT: otel-agent.observability.svc.cluster.local:4317
  KAFKA_BROKERS: kafka:9092
  NORMALIZED_TOPIC: normalized_logistics_events
  KAFKA_GROUP_ID: shipment-core-service
  KAFKA_CONSUMER_ENABLED: "true"

  DB_QUERY_TIMEOUT: 3s
  DB_WRITE_TIMEOUT: 5s
  DB_CONNECT_TIMEOUT: 3s
  PG_MAX_CONNS: "80"
  PG_MIN_CONNS: "20"
  PG_MAX_CONN_LIFETIME: 30m
  PG_MAX_CONN_IDLE_TIME: 10m
  PG_HEALTH_CHECK_PERIOD: 30s

  HTTP_READ_TIMEOUT: 5s
  HTTP_WRITE_TIMEOUT: 10s
  HTTP_IDLE_TIMEOUT: 60s
  SHUTDOWN_TIMEOUT: 15s
  ENABLE_AUTO_MIGRATE: "true"
  OTLP_METRIC_INTERVAL: 10s
