apiVersion: v1
kind: Service
metadata:
  name: shipment-core-service
  namespace: logistics
  labels:
    app: shipment-core-service
spec:
  selector:
    app: shipment-core-service
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 9090
      targetPort: grpc
