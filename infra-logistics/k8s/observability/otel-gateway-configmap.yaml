apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-gateway-config
  namespace: observability
data:
  otel-gateway-config.yaml: |
    receivers:
      # Receives telemetry from otel-agent DaemonSet.
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 512
      batch:
        send_batch_size: 4096
        timeout: 5s

    exporters:
      # Exposes aggregated metrics for Prometheus scrape on /metrics.
      prometheus:
        endpoint: 0.0.0.0:9464
        metric_expiration: 180m
      # Optional trace sink for debugging. Replace with Jaeger/Tempo in production.
      logging:
        verbosity: normal

    service:
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [prometheus]
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [logging]
