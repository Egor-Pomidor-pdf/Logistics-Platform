apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-agent-config
  namespace: observability
data:
  otel-agent-config.yaml: |
    receivers:
      # Receives traces/metrics from services such as shipment-core-service and eta-sla-service.
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # Optional: scrape legacy /metrics endpoints (disabled by default).
      # prometheus:
      #   config:
      #     scrape_configs:
      #       - job_name: shipment-core-service
      #         static_configs:
      #           - targets: ["shipment-core-service.logistics.svc.cluster.local:8080"]

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
      batch:
        send_batch_size: 2048
        timeout: 5s

    exporters:
      # Agent forwards everything to central gateway.
      otlp/gateway:
        endpoint: otel-gateway.observability.svc.cluster.local:4317
        tls:
          insecure: true
        sending_queue:
          enabled: true
          queue_size: 4096
        retry_on_failure:
          enabled: true

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/gateway]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/gateway]
