apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-agent
  namespace: observability
  labels:
    app: otel-agent
spec:
  selector:
    matchLabels:
      app: otel-agent
  template:
    metadata:
      labels:
        app: otel-agent
    spec:
      containers:
        - name: otel-agent
          image: otel/opentelemetry-collector-contrib:0.119.0
          args: ["--config=/conf/otel-agent-config.yaml"]
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          volumeMounts:
            - name: otel-agent-config
              mountPath: /conf
      volumes:
        - name: otel-agent-config
          configMap:
            name: otel-agent-config
            items:
              - key: otel-agent-config.yaml
                path: otel-agent-config.yaml
---
# Optional Service so applications can use OTLP_ENDPOINT=otel-agent.observability.svc.cluster.local:4317.
apiVersion: v1
kind: Service
metadata:
  name: otel-agent
  namespace: observability
spec:
  selector:
    app: otel-agent
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
