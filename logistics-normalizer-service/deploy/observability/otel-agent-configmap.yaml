apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-agent-config
  namespace: observability
data:
  otel-agent-config.yaml: |
    receivers:
      # Receives traces + metrics from logistics-normalizer via OTLP.
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      # Optional scrape of app /metrics endpoints (disabled for this OTLP-first setup).
      # prometheus:
      #   config:
      #     scrape_configs:
      #       - job_name: logistics-normalizer
      #         static_configs:
      #           - targets: ["logistics-normalizer.default.svc.cluster.local:2112"]

    processors:
      batch: {}

    exporters:
      # Forwards all telemetry to central collector gateway.
      otlp/gateway:
        endpoint: otel-gateway.observability.svc.cluster.local:4317
        tls:
          insecure: true

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/gateway]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/gateway]
