syntax = "proto3";

package shipmentcore.v1;

option go_package = "github.com/dns/logistics/shipment-core-service/internal/api/shipmentcore/v1;shipmentcorev1";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service ShipmentCoreService {
  rpc GetShipment(GetShipmentRequest) returns (GetShipmentResponse);
  rpc ListShipments(ListShipmentsRequest) returns (ListShipmentsResponse);
  rpc Ping(google.protobuf.Empty) returns (PingResponse);
}

message GetShipmentRequest {
  string shipment_id = 1;
}

message GetShipmentResponse {
  Shipment shipment = 1;
}

message ListShipmentsRequest {
  string status_code = 1;
  string source_system = 2;
  string route_id = 3;
  uint32 limit = 4;
  uint32 offset = 5;
}

message ListShipmentsResponse {
  repeated Shipment shipments = 1;
  uint32 limit = 2;
  uint32 offset = 3;
}

message Shipment {
  string shipment_id = 1;
  string last_event_id = 2;
  string status_code = 3;
  google.protobuf.Timestamp status_ts = 4;
  string source_system = 5;
  string location_code = 6;
  string partner_id = 7;
  string route_id = 8;
  bytes payload = 9;
  google.protobuf.Timestamp updated_at = 10;
  google.protobuf.Timestamp estimated_delivery = 11;
}

message PingResponse {
  string status = 1;
}
